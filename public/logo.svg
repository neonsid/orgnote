<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="mainGradient" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background Rounded Square -->
  <rect x="20" y="20" width="180" height="180" rx="40" fill="url(#mainGradient)"/>

  <!-- Note Paper -->
  <rect x="65" y="55" width="90" height="110" rx="12" fill="white"/>

  <!-- Fold Corner -->
  <polygon points="135,55 155,75 135,75" fill="#E5E7EB"/>

  <!-- Organization Nodes -->
  <circle cx="110" cy="95" r="8" fill="#4F46E5"/>
  <circle cx="90" cy="125" r="6" fill="#06B6D4"/>
  <circle cx="130" cy="125" r="6" fill="#06B6D4"/>

  <!-- Connecting Lines -->
  <line x1="110" y1="95" x2="90" y2="125" stroke="#4F46E5" stroke-width="2"/>
  <line x1="110" y1="95" x2="130" y2="125" stroke="#4F46E5" stroke-width="2"/>

</svg>
